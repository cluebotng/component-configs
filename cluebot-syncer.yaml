components:
  repository-syncer:
    build:
      repository: https://github.com/cluebotng/repository-syncer.git
      ref: refs/tags/v1.1.14
    run:
      schedule: '*/15 * * * *'
      timeout: 3600
      mount: none
      command: run-sync
  # Monitoring
  grafana-alloy:
    build:
      repository: https://github.com/cluebotng/external-grafana-alloy.git
      ref: refs/tags/v0.6.0
    run:
      command: run-alloy
      port: 8118
      health_check_http: /health
      mount: all
  monitoring-toolforge:
    build:
      repository: https://github.com/cluebotng/monitoring-toolforge.git
      ref: refs/tags/v1.1.1
    run:
      command: run
      port: 8000
      health_check_http: /health
      mount: all
