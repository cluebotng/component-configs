components:
  core:
    build:
      repository: https://github.com/cluebotng/external-core.git
      ref: refs/tags/v1.5.0
    run:
      command: ./cluebotng -l -m live_run
      port: 3565
      health_check_script: bash -c 'nc localhost 3565 <<< "<WPEditSet />"'
  report-interface:
    build:
      repository: https://github.com/cluebotng/report.git
      ref: refs/tags/v1.9.4
    run:
      command: web
      port: 8000
      health_check_http: /api/?action=health.check
      replicas: 2
  grafana-alloy:
    build:
      repository: https://github.com/cluebotng/external-grafana-alloy.git
      ref: refs/tags/v0.7.0
    run:
      command: run-alloy
      port: 8118
      health_check_http: /health
      mount: all
  monitoring-toolforge:
    build:
      repository: https://github.com/cluebotng/monitoring-toolforge.git
      ref: refs/tags/v1.2.0
    run:
      command: run
      port: 8000
      health_check_http: /health
      mount: all
  redis:
    build:
      repository: https://github.com/cluebotng/external-redis.git
      ref: refs/tags/v1.1.0
    run:
      command: redis-server
      port: 6379
