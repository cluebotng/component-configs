components:
  coordinator:
    build:
      repository: https://github.com/cluebotng/trainer.git
      ref: refs/tags/v1.5.3
    run:
      schedule: '13 13 * * *'
      mount: all
      command: launcher ./deployment/entrypoint.sh run-edit-sets
  file-api:
    build:
      repository: https://github.com/cluebotng/fileserver.git
      ref: refs/tags/v1.2.9
    run:
      command: run-fileserver
      port: 8000
      replicas: 2
      health_check_http: /_/health
      mount: all
  # Monitoring
  grafana-alloy:
    build:
      repository: https://github.com/cluebotng/external-grafana-alloy.git
      ref: refs/tags/v0.4.11
    run:
      command: run-alloy
      port: 8118
      health_check_http: /health
      mount: all
  pushgateway:
    build:
      repository: https://github.com/cluebotng/external-pushgateway.git
      ref: refs/tags/v0.0.4
    run:
      command: run-pushgateway
      port: 9091
      health_check_http: /-/healthy
      mount: all
  ## Cleanup
  prune-runs:
    build:
      repository: https://github.com/cluebotng/external-utilities.git
      ref: refs/tags/v1.0.9
    run:
      command: bash -c 'find "/data/project/cluebotng-trainer/public_html" -type f -mtime +7 -delete'
      schedule: '30 2 * * *'
      mount: all
