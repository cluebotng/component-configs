components:
  cluebot3:
    build:
      repository: https://github.com/cluebotng/cluebot3.git
      ref: refs/tags/v2.1.0
    run:
      command: run-bot
      memory: 1Gi
      cpu: '3'
      health_check_script: health-check
  # Monitoring
  grafana-alloy:
    build:
      repository: https://github.com/cluebotng/external-grafana-alloy.git
      ref: refs/tags/v0.7.0
    run:
      command: run-alloy
      port: 8118
      health_check_http: /health
      mount: all
  monitoring-toolforge:
    build:
      repository: https://github.com/cluebotng/monitoring-toolforge.git
      ref: refs/tags/v1.1.1
    run:
      command: run
      port: 8000
      health_check_http: /health
      mount: all
