components:
  file-api:
    build:
      repository: https://github.com/cluebotng/fileserver.git
      ref: refs/tags/v2.0.0
    run:
      command: run-fileserver
      port: 8000
      replicas: 2
      health_check_http: /_/health
      mount: all
  # Monitoring
  grafana-alloy:
    build:
      repository: https://github.com/cluebotng/external-grafana-alloy.git
      ref: refs/tags/v0.7.0
    run:
      command: run-alloy
      port: 8118
      health_check_http: /health
      mount: all
  monitoring-toolforge:
    build:
      repository: https://github.com/cluebotng/monitoring-toolforge.git
      ref: refs/tags/v1.2.0
    run:
      command: run
      port: 8000
      health_check_http: /health
      mount: all
