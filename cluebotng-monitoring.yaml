components:
  # Core services
  prometheus:
    build:
      repository: https://github.com/cluebotng/monitoring-prometheus.git
      ref: refs/tags/v1.4.1
    run:
      command: prometheus
      port: 9090
      health_check_http: /-/healthy
      mount: all
  alertmanager:
    build:
      repository: https://github.com/cluebotng/monitoring-alertmanager.git
      ref: refs/tags/v1.1.0
    run:
      command: alertmanager
      port: 9093
      health_check_http: /-/healthy
      mount: all
  blackbox-exporter:
    build:
      repository: https://github.com/cluebotng/monitoring-blackbox-exporter.git
      ref: refs/tags/v1.1.0
    run:
      command: blackbox-exporter
      port: 9115
      replicas: 2
  grafana:
    build:
      repository: https://github.com/cluebotng/monitoring-grafana.git
      ref: refs/tags/v1.1.0
    run:
      command: grafana
      port: 3000
      health_check_http: /api/health
      replicas: 1
      mount: all
  wiki-update-receiver:
    build:
      repository: https://github.com/cluebotng/monitoring-wiki-update-receiver.git
      ref: refs/tags/v1.0.70
    run:
      command: run-api
      port: 8900
      health_check_http: /health
      replicas: 2
  checker:
    build:
      repository: https://github.com/cluebotng/monitoring-checker.git
      ref: refs/tags/v1.3.7
    run:
      command: run-checker
      port: 8090
      health_check_http: /health
      replicas: 2
      mount: all
  # Sidecars
  grafana-alloy:
    build:
      repository: https://github.com/cluebotng/external-grafana-alloy.git
      ref: refs/tags/v0.6.0
    run:
      command: run-alloy
      port: 8118
      health_check_http: /health
      mount: all
  monitoring-toolforge:
    build:
      repository: https://github.com/cluebotng/monitoring-toolforge.git
      ref: refs/tags/v1.1.1
    run:
      command: run
      port: 8000
      health_check_http: /health
      mount: all
